<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../common/shared.css">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <!-- Header -->
        <div class="header">
            <div class="title">Interactive Previews</div>
            <div id="open-settings" class="settings-btn" title="Open full options page">
                <span class="icon"></span>
            </div>
        </div>

        <!-- Tab bar -->
        <div class="tab-bar">
            <div id="mode-off" class="mode-tab">
                <button class="btn">Off</button>
            </div>
            <div id="mode-blacklist" class="mode-tab active">
                <button class="btn">Disable on</button>
            </div>
            <div id="mode-whitelist" class="mode-tab">
                <button class="btn">Enable on</button>
            </div>
        </div>

        <!-- Action area -->
        <div class="actions-area">
            <div id="actions">
                <!-- Buttons will be injected here based on mode -->
            </div>
            <div id="status-message" class="status-text hidden"></div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
